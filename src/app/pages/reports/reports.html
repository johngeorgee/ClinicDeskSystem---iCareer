
<div class="page-container">
  
  <!-- Header -->
  <div class="page-header">
    <div class="header-text">
      <h1 class="page-title">Clinic Reports</h1>
      <p class="page-subtitle">Informational overview and analytical summary.</p>
    </div>
  </div>

  <!-- Statistics Grid -->
  <div class="stats-grid">
    <app-stat-card
      title="Total Patients Today"
      [value]="totalPatientsToday"
      icon="people"
    ></app-stat-card>

    <app-stat-card
      title="Completed Visits"
      [value]="completedVisits"
      icon="task_alt"
    ></app-stat-card>

    <app-stat-card
      title="Waiting Patients"
      [value]="waitingPatients"
      icon="hourglass_empty"
    ></app-stat-card>

    <app-stat-card
      title="Avg Consultation Time"
      [value]="avgConsultationTime"
      icon="timer"
    ></app-stat-card>

    <app-stat-card
      title="Doctors Available"
      [value]="doctorsAvailable"
      icon="medical_services"
    ></app-stat-card>

    <app-stat-card
      title="Doctors Busy"
      [value]="doctorsBusy"
      icon="do_not_disturb_on"
    ></app-stat-card>
  </div>

  <!-- Charts Grid -->
  <div class="charts-grid">
    <!-- Visits by Department -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Visits by Department</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas
            baseChart
            [data]="departmentVisitsChartData"
            [options]="departmentVisitsChartOptions"
            [type]="'pie'"
          >
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Visits by Doctor -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Visits by Doctor</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas
            baseChart
            [data]="doctorVisitsChartData"
            [options]="doctorVisitsChartOptions"
            [type]="'bar'"
          >
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <!-- Recent Summary Table -->
  <mat-card class="summary-card">
    <mat-card-header>
      <mat-card-title>Recent Summary</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="table-responsive">
        <table mat-table [dataSource]="summaryData" class="summary-table">
          
          <ng-container matColumnDef="doctor">
            <th mat-header-cell *matHeaderCellDef> Doctor </th>
            <td mat-cell *matCellDef="let element"> 
              <strong>{{ element.doctorName }}</strong> 
            </td>
          </ng-container>

          <ng-container matColumnDef="totalPatients">
            <th mat-header-cell *matHeaderCellDef> Total Patients </th>
            <td mat-cell *matCellDef="let element"> {{ element.totalPatients }} </td>
          </ng-container>

          <ng-container matColumnDef="completedVisits">
            <th mat-header-cell *matHeaderCellDef> Completed Visits </th>
            <td mat-cell *matCellDef="let element"> {{ element.completedVisits }} </td>
          </ng-container>

          <ng-container matColumnDef="avgTime">
            <th mat-header-cell *matHeaderCellDef> Avg Consultation Time </th>
            <td mat-cell *matCellDef="let element"> {{ element.avgTime }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>

</div>
